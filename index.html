<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Showcase</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <header class="profile-card">
        <div class="profile-content">
            <img src="https://avatars.githubusercontent.com/u/143551139?v=4" alt="Your Profile Picture" class="profile-pic">
            <div class="profile-text">
                <h1>Wajid Korkani</h1>
                <p>Content Creator | UI/UX Designer | Developer</p>
                <div class="stats">
                    <span><strong>50+</strong> Thumbnails</span>
                    <span><strong>3+</strong> Years Experience</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">Thumbnail Gallery</h2>
        <div class="thumbnail-grid">
            <div class="thumbnail-item"><img src="1.jpg" alt="Work"></div>
            <div class="thumbnail-item"><img src="2.jpg" alt="Work"></div>
            <div class="thumbnail-item"><img src="3.jpg" alt="Work"></div>
            <div class="thumbnail-item"><img src="6.jpg" alt="Work"></div>
            <div class="thumbnail-item"><img src="4.jpg" alt="Work"></div>
            <div class="thumbnail-item"><img src="5.jpg" alt="Work"></div>
        </div>
    </main>

</body>
</html>
